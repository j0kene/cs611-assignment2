services:
  airflow-init:
    build: .
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__FERNET_KEY=PAqBeGJLJTYFzVkOGHWIYXdLO7XdXz5yTdxAGJe9ezM=
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - airflow_data:/opt/airflow
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
      - ./datamart:/opt/airflow/datamart
      - ./model_bank:/opt/airflow/model_bank
    entrypoint: >
      /bin/bash -c "airflow db init &&
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true"

  airflow-webserver:
    build: .
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__FERNET_KEY=PAqBeGJLJTYFzVkOGHWIYXdLO7XdXz5yTdxAGJe9ezM=
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - airflow_data:/opt/airflow
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
      - ./datamart:/opt/airflow/datamart
      - ./model_bank:/opt/airflow/model_bank
    ports:
      - "8080:8080"
    command:
      - bash
      - -c
      - >
        airflow webserver &
        AIRFLOW_PID=$$! &&
        echo "Waiting for Airflow webserver to become ready..." &&
        until curl -s -o /dev/null http://localhost:8080/health; do sleep 2; done &&
        echo "" &&
        echo "=================================================================" &&
        echo "  Airflow is ready! Open this link in your browser:" &&
        echo "  http://localhost:8080" &&
        echo "  Login -> username: admin   password: admin" &&
        echo "=================================================================" &&
        wait $$AIRFLOW_PID

  airflow-scheduler:
    build: .
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__FERNET_KEY=PAqBeGJLJTYFzVkOGHWIYXdLO7XdXz5yTdxAGJe9ezM=
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - airflow_data:/opt/airflow
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
      - ./datamart:/opt/airflow/datamart
      - ./model_bank:/opt/airflow/model_bank
    command: scheduler

volumes:
  airflow_data:
